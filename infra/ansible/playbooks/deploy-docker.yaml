- name: Deploy do Frontend e Gateway na VM da Azure
  hosts: apis
  become: true

  vars:
    weather_web_image: mainiere/weather-web:latest
    weather_web_container_name: weather-web
    weather_web_port: 8080

  tasks:
    - name: Atualizar pacotes do sistema
      apt:
        update_cache: yes
        upgrade: dist

    - name: Instalar dependencias necessarias
      apt:
        name:
          - docker.io
          - nginx
          - ca-certificates
        state: present

    - name: Garantir que o Docker esta ativo
      service:
        name: docker
        state: started
        enabled: yes

    - name: Garantir que o Nginx esta ativo
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Baixar imagem Docker do frontend
      shell: docker pull {{ weather_web_image }}

    - name: Remover container antigo do frontend
      shell: docker rm -f {{ weather_web_container_name }} || true

    - name: Subir container do frontend
      shell: |
        docker run -d \
          --name {{ weather_web_container_name }} \
          --restart unless-stopped \
          -p 127.0.0.1:{{ weather_web_port }}:80 \
          {{ weather_web_image }}

    - name: Remover container antigo da API na VM
      shell: docker rm -f weather-api || true

    - name: Copiar configuracao do Nginx Gateway
      copy:
        src: ../../gateway/nginx.conf
        dest: /etc/nginx/sites-available/weather-gateway
        mode: "0644"

    - name: Remover site padrao do Nginx
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Habilitar site do Gateway
      file:
        src: /etc/nginx/sites-available/weather-gateway
        dest: /etc/nginx/sites-enabled/weather-gateway
        state: link
        force: yes

    - name: Validar configuracao do Nginx
      shell: nginx -t

    - name: Reiniciar Nginx
      service:
        name: nginx
        state: restarted

    - name: Validar frontend local
      uri:
        url: http://127.0.0.1:8080
        status_code: 200

    - name: Validar API via gateway interno do AKS
      uri:
        url: http://10.20.2.62/health
        status_code: 200
