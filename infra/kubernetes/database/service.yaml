apiVersion: v1
kind: Service

metadata:
  name: postgres-primary-headless
  namespace: weather-app

spec:
  clusterIP: None
  selector:
    app: postgres
    role: primary
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
