apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: weather-web
  namespace: weather-app

spec:
  ingressClassName: webapprouting.kubernetes.azure.com
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: weather-web
                port:
                  number: 80
